<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media | Durga Psychiatric Centre</title>

<style>

/* ===== PAGE ===== */
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:#fff;
}

/* ===== SECTION ===== */
.social-section{
  padding:24px 16px;
  max-width:900px;
  margin:auto;
}

/* ===== TITLE ===== */
.social-title{
  font-size:22px;
  font-weight:700;
  color:#facc15;
  margin-bottom:16px;
}

/* ===== CARD ===== */
.social-card{
  background:linear-gradient(145deg,#0f1b33,#0a1326);
  border-radius:18px;
  padding:14px;
  margin-bottom:18px;
  box-shadow:
    0 8px 30px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.06);
}

/* ===== IFRAME ===== */
.social-card iframe{
  width:100%;
  border-radius:12px;
  border:none;
}

/* ===== BUTTON ===== */
.social-btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 16px;
  border-radius:999px;
  background:linear-gradient(90deg,#facc15,#fb7185);
  color:#000;
  font-weight:600;
  text-decoration:none;
  font-size:14px;
}

</style>
</head>

<body>

<div class="social-section">

  <!-- 🔴 YOUTUBE (AUTO UPDATING) -->
  <div class="social-title">🎥 Latest Videos</div>

  <div class="social-card">
    <iframe height="220"
      src="https://www.youtube.com/embed/videoseries?list=YOUR_UPLOAD_PLAYLIST_ID">
    </iframe>

    <a class="social-btn" href="https://youtube.com/YOUR_CHANNEL" target="_blank">
      Watch on YouTube
    </a>
  </div>


  <!-- 🔵 FACEBOOK (AUTO TIMELINE) -->
  <div class="social-title">📘 Facebook Updates</div>

  <div class="social-card">
    <iframe height="400"
      src="https://www.facebook.com/plugins/page.php?
      href=YOUR_FACEBOOK_PAGE_URL
      &tabs=timeline
      &width=500
      &height=400">
    </iframe>

    <a class="social-btn" href="YOUR_FACEBOOK_PAGE_URL" target="_blank">
      Open Facebook
    </a>
  </div>


  <!-- 🟣 INSTAGRAM (FEATURED + PROFILE) -->
  <div class="social-title">📸 Instagram</div>

  <div class="social-card">

    <!-- Replace with your latest post link -->
    <blockquote class="instagram-media"
      data-instgrm-permalink="https://www.instagram.com/p/POST_ID/">
    </blockquote>

    <script async src="//www.instagram.com/embed.js"></script>

    <a class="social-btn" href="https://instagram.com/YOUR_ID" target="_blank">
      View Instagram
    </a>

  </div>

</div>

</body>
</html>
